<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>📸 ESSO Cleaning Photos</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="config.js"></script>  <!-- ✅ LOADED HERE (before </head>) -->
<style>
  body { font-family: 'Segoe UI', Tahoma, sans-serif; }
  .gradient-bg { background: linear-gradient(135deg, #0891b2 0%, #0e7490 50%, #155e75 100%); }
  .photo-card { transition: all 0.3s; }
  .photo-card:hover { transform: scale(1.03); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
  .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; align-items: center; justify-content: center; }
  .modal.active { display: flex; }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: #f1f1f1; }
  ::-webkit-scrollbar-thumb { background: #0891b2; border-radius: 4px; }
  
  .upload-zone {
    border: 3px dashed #0891b2;
    border-radius: 12px;
    padding: 40px 20px;
    text-align: center;
    background: #f0f9ff;
    cursor: pointer;
    transition: all 0.3s;
  }
  .upload-zone:hover {
    background: #e0f2fe;
  }
  
  .big-btn {
    color: white;
    padding: 20px 40px;
    border-radius: 16px;
    font-weight: bold;
    font-size: 20px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    transition: all 0.3s;
    border: none;
    cursor: pointer;
    width: 100%;
  }
  .big-btn:hover {
    transform: translateY(-3px);
    box-shadow: 0 6px 20px rgba(0,0,0,0.3);
  }
  .big-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  
  .spinner {
    border: 3px solid #f3f3f3;
    border-top: 3px solid white;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    animation: spin 1s linear infinite;
    display: inline-block;
    vertical-align: middle;
    margin-right: 8px;
  }
  @keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
  }
</style>
</head>  <!-- ✅ ONLY ONE </head> TAG -->

<body class="bg-gray-50 min-h-screen">

<!-- HEADER -->
<header class="gradient-bg text-white shadow-lg">
  <div class="container mx-auto px-6 py-5 flex items-center justify-between flex-wrap">
    <div class="flex items-center gap-3">
      <div class="text-4xl">📸</div>
      <div>
        <h1 class="text-2xl font-bold">ESSO Cleaning Photos</h1>
        <p class="text-sm opacity-90">Cloud Storage - Simple & Free</p>
      </div>
    </div>
    <div class="text-right">
      <p class="text-sm opacity-90" id="currentDate"></p>
      <p class="text-xs opacity-75" id="currentTime"></p>
    </div>
  </div>
</header>

<div class="container mx-auto px-6 py-6">

  <!-- BIG UPLOAD BUTTONS -->
  <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
    <button onclick="openUploadModal('camera')" class="big-btn" style="background: linear-gradient(135deg, #0891b2 0%, #0e7490 100%);">
      📷 Take Photo
    </button>
    <button onclick="openUploadModal('gallery')" class="big-btn" style="background: linear-gradient(135deg, #16a34a 0%, #15803d 100%);">
      🖼️ Choose from Gallery
    </button>
  </div>

  <!-- PHOTO COUNT -->
  <div class="bg-white p-4 rounded-xl shadow-md mb-4 flex justify-between items-center flex-wrap gap-3">
    <div>
      <p class="text-gray-500 text-sm">Total Photos</p>
      <h2 class="text-2xl font-bold text-cyan-700" id="photoCount">0</h2>
    </div>
    <input type="file" id="cameraInput" accept="image/*" capture="environment" class="hidden" onchange="handleFile(event)" />
    <input type="file" id="galleryInput" accept="image/*" class="hidden" onchange="handleFile(event)" />
  </div>

  <!-- GALLERY -->
  <div id="photoGallery" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-3">
  </div>

  <div id="emptyState" class="text-center py-16 text-gray-400">
    <div class="text-7xl mb-3">📷</div>
    <p class="text-xl">No photos yet</p>
    <p class="text-sm">Tap a button above to add your first photo</p>
  </div>

</div>

<!-- UPLOAD MODAL -->
<div id="uploadModal" class="modal">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md mx-4">
    <div class="gradient-bg text-white p-5 rounded-t-2xl flex justify-between items-center">
      <h2 class="text-xl font-bold">☁️ Uploading...</h2>
      <button onclick="closeUploadModal()" class="text-white text-2xl hover:scale-110">✕</button>
    </div>
    <div class="p-6 text-center">
      <div id="uploadPreview" class="mb-4">
        <img id="previewImg" class="w-full rounded-lg" />
      </div>
      <div id="uploadStatus" class="mb-4">
        <div class="spinner" style="border-top-color: #0891b2; width: 40px; height: 40px;"></div>
        <p class="mt-3 text-gray-700 font-semibold" id="statusText">Uploading to cloud...</p>
      </div>
      <button id="closeBtn" onclick="closeUploadModal()" class="hidden w-full bg-gray-300 hover:bg-gray-400 text-gray-800 py-3 rounded-lg font-semibold">
        Done
      </button>
    </div>
  </div>
</div>

<!-- VIEW MODAL -->
<div id="viewModal" class="modal">
  <div class="bg-white rounded-2xl shadow-2xl w-full max-w-2xl mx-4 max-h-[90vh] overflow-y-auto">
    <div class="gradient-bg text-white p-5 rounded-t-2xl flex justify-between items-center">
      <h2 class="text-xl font-bold">📷 Photo</h2>
      <button onclick="closeViewModal()" class="text-white text-2xl hover:scale-110">✕</button>
    </div>
    <div class="p-6">
      <img id="viewImage" class="w-full rounded-lg mb-4" />
      <div class="text-center text-gray-600">
        <p class="text-sm" id="viewDate"></p>
        <p class="text-xs text-gray-400 mt-1" id="viewTime"></p>
      </div>
      <div class="flex gap-2 mt-4">
        <a id="viewLink" target="_blank" class="flex-1 bg-cyan-600 hover:bg-cyan-700 text-white py-2 rounded-lg font-semibold text-center">🔗 Open Full</a>
        <button onclick="copyLink()" class="flex-1 bg-gray-600 hover:bg-gray-700 text-white py-2 rounded-lg font-semibold">📋 Copy Link</button>
        <button onclick="deleteCurrentPhoto()" class="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg font-semibold">🗑️</button>
      </div>
    </div>
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="fixed bottom-5 right-5 hidden bg-green-600 text-white px-6 py-3 rounded-lg shadow-2xl z-50 font-semibold"></div>

<footer class="text-center py-6 text-gray-500 text-sm">
  © 2025 ESSO Cleaning Photos | Free Cloud Storage
</footer>

<script>
// ============== CONFIGURATION ==============
// API key is loaded from config.js file (separately, for security)
const IMGBB_API_KEY = window.APP_CONFIG?.imgbbApiKey || '';

// Check if API key is loaded
if (!IMGBB_API_KEY) {
  alert('⚠️ Configuration error!\n\nPlease make sure config.js file exists with your API key.\n\nContact admin if problem persists.');
  throw new Error('API key missing - check config.js');
}

// ============== DATA ==============
let photos = JSON.parse(localStorage.getItem('essoCleaningPhotos')) || [];
let currentPhotoId = null;

function saveToStorage() {
  localStorage.setItem('essoCleaningPhotos', JSON.stringify(photos));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.remove('hidden');
  setTimeout(() => t.classList.add('hidden'), 2500);
}

function updateDateTime() {
  const now = new Date();
  document.getElementById('currentDate').textContent = now.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('currentTime').textContent = now.toLocaleTimeString('en-GB');
}

// ============== UPLOAD ==============
function openUploadModal(source) {
  if (!IMGBB_API_KEY) {
    showToast('⚠️ API key not configured!');
    return;
  }
  if (source === 'camera') {
    document.getElementById('cameraInput').click();
  } else {
    document.getElementById('galleryInput').click();
  }
}

function closeUploadModal() {
  document.getElementById('uploadModal').classList.remove('active');
  document.getElementById('cameraInput').value = '';
  document.getElementById('galleryInput').value = '';
  document.getElementById('closeBtn').classList.add('hidden');
  document.getElementById('uploadStatus').classList.remove('hidden');
}

function handleFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  
  if (file.size > 10 * 1024 * 1024) {
    showToast('⚠️ File too large! Max 10MB');
    return;
  }

  // Show preview
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('previewImg').src = e.target.result;
  };
  reader.readAsDataURL(file);
  
  document.getElementById('uploadModal').classList.add('active');
  
  // Upload
  uploadToCloud(file);
}

async function uploadToCloud(file) {
  document.getElementById('statusText').textContent = 'Uploading to cloud...';
  
  try {
    const formData = new FormData();
    formData.append('image', file);
    
    const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
      method: 'POST',
      body: formData
    });
    
    const data = await response.json();
    
    if (data.success) {
      // Save record
      const photoRecord = {
        id: Date.now(),
        imageUrl: data.data.url,
        thumbUrl: data.data.thumb.url,
        date: new Date().toISOString(),
        dateOnly: new Date().toISOString().split('T')[0]
      };
      
      photos.unshift(photoRecord);
      saveToStorage();
      
      document.getElementById('statusText').textContent = '✅ Uploaded!';
      document.getElementById('uploadStatus').innerHTML = '<div class="text-6xl">✅</div><p class="mt-3 text-green-600 font-bold text-lg">Saved to Cloud!</p>';
      document.getElementById('closeBtn').classList.remove('hidden');
      
      renderGallery();
      showToast('✅ Photo saved!');
    } else {
      throw new Error(data.error?.message || 'Upload failed');
    }
  } catch (err) {
    document.getElementById('uploadStatus').innerHTML = '<div class="text-6xl">❌</div><p class="mt-3 text-red-600 font-bold">Upload Failed</p><p class="text-sm text-gray-500 mt-1">' + err.message + '</p>';
    document.getElementById('closeBtn').classList.remove('hidden');
  }
}

// ============== GALLERY ==============
function renderGallery() {
  const gallery = document.getElementById('photoGallery');
  document.getElementById('photoCount').textContent = photos.length;
  
  if (photos.length === 0) {
    gallery.innerHTML = '';
    document.getElementById('emptyState').classList.remove('hidden');
  } else {
    document.getElementById('emptyState').classList.add('hidden');
    gallery.innerHTML = photos.map(p => {
      const date = new Date(p.date);
      const dateStr = date.toLocaleDateString('en-GB', {day:'2-digit', month:'short'});
      const timeStr = date.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
      return `
        <div class="photo-card bg-white rounded-lg shadow-md overflow-hidden cursor-pointer relative" onclick="viewPhoto(${p.id})">
          <img src="${p.thumbUrl}" class="w-full h-32 object-cover" loading="lazy" />
          <div class="absolute bottom-0 left-0 right-0 bg-gradient-to-t from-black/80 to-transparent p-2">
            <p class="text-white text-xs font-bold">${dateStr}</p>
            <p class="text-white text-xs opacity-80">${timeStr}</p>
          </div>
        </div>
      `;
    }).join('');
  }
}

// ============== VIEW ==============
function viewPhoto(id) {
  const p = photos.find(x => x.id === id);
  if (!p) return;
  
  currentPhotoId = id;
  const date = new Date(p.date);
  
  document.getElementById('viewImage').src = p.imageUrl;
  document.getElementById('viewLink').href = p.imageUrl;
  document.getElementById('viewDate').textContent = date.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long', year:'numeric'});
  document.getElementById('viewTime').textContent = date.toLocaleTimeString('en-GB');
  
  document.getElementById('viewModal').classList.add('active');
}

function closeViewModal() {
  document.getElementById('viewModal').classList.remove('active');
  currentPhotoId = null;
}

function copyLink() {
  const p = photos.find(x => x.id === currentPhotoId);
  if (!p) return;
  navigator.clipboard.writeText(p.imageUrl).then(() => {
    showToast('📋 Link copied!');
  }).catch(() => {
    showToast('⚠️ Could not copy');
  });
}

function deleteCurrentPhoto() {
  if (!currentPhotoId) return;
  if (confirm('Delete this photo?')) {
    photos = photos.filter(p => p.id !== currentPhotoId);
    saveToStorage();
    closeViewModal();
    renderGallery();
    showToast('🗑️ Photo deleted');
  }
}

// ============== INIT ==============
updateDateTime();
setInterval(updateDateTime, 1000);
renderGallery();
</script>
</body>
</html>
